<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Office Monitoring - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS Variables for consistent theming */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --temp-color: #ff7675;
            --humi-color: #00cec9;
            --pres-color: #a29bfe;
            --text-dark: #2d3436;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            padding: 20px; 
            color: var(--text-dark); 
            margin: 0;
        }

        h2 { text-align: center; color: var(--text-dark); margin-bottom: 10px; }
        
        #status-container { text-align: center; margin-bottom: 25px; }
        #status { 
            font-weight: bold; 
            padding: 6px 18px; 
            border-radius: 20px; 
            background: #dfe6e9; 
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .container { 
            display: grid; 
            grid-template-columns: 1fr 350px; 
            gap: 20px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; }
        }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05); 
            margin-bottom: 20px;
        }

        /* Environmental Data Grid */
        .env-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin-bottom: 25px; 
        }
        .env-item { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid #eee;
        }
        .env-label { font-size: 0.85em; color: #636e72; display: block; margin-bottom: 5px; }
        .env-value { font-size: 1.4em; font-weight: bold; }

        .chart-box { margin-bottom: 30px; height: 230px; }

        /* RFID Log Section */
        #rfid-logs { 
            height: 650px; 
            overflow-y: auto; 
            background: #2d3436; 
            color: #dfe6e9; 
            padding: 15px; 
            border-radius: 12px; 
            font-family: 'Courier New', monospace; 
            font-size: 0.85em; 
        }
        .log-entry { 
            border-left: 3px solid #00cec9; 
            padding: 10px; 
            margin-bottom: 10px; 
            border-bottom: 1px solid #444; 
            background: rgba(255,255,255,0.03);
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .log-time { color: #fab1a0; }
        .status-granted { color: #55efc4; font-weight: bold; }
        .status-denied { color: #ff7675; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Smart Office Pro Dashboard 🚀</h2>
    <div id="status-container">
        System Status: <span id="status">Connecting...</span>
    </div>

    <div class="container">
        <div class="main-content">
            <div class="card">
                <h3>📊 BME280 Sensor Data</h3>
                <div class="env-grid">
                    <div class="env-item">
                        <span class="env-label">Temperature</span>
                        <span class="env-value" id="temp-val" style="color: var(--temp-color);">--</span> <small>°C</small>
                    </div>
                    <div class="env-item">
                        <span class="env-label">Humidity</span>
                        <span class="env-value" id="humi-val" style="color: var(--humi-color);">--</span> <small>%</small>
                    </div>
                    <div class="env-item">
                        <span class="env-label">Pressure</span>
                        <span class="env-value" id="pres-val" style="color: var(--pres-color);">--</span> <small>hPa</small>
                    </div>
                </div>

                <div class="chart-box"><canvas id="tempChart"></canvas></div>
                <div class="chart-box"><canvas id="humiChart"></canvas></div>
                <div class="chart-box"><canvas id="presChart"></canvas></div>
            </div>
        </div>

        <div class="side-content">
            <div class="card">
                <h3>🔑 RFID Access Log</h3>
                <div id="rfid-logs">
                    <div style="color: #636e72; text-align: center; margin-top: 20px;">Waiting for scan...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        // Establish WebSocket connection
        const socket = new WebSocket('ws://' + window.location.host + '/ws');

        // Helper function to initialize Chart.js graphs
        function initChart(canvasId, label, color, unit) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: label + ' (' + unit + ')',
                        data: [],
                        borderColor: color,
                        backgroundColor: color + '22',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { display: false }, ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 5 } },
                        y: { beginAtZero: false, grid: { color: '#f0f0f0' } }
                    },
                    plugins: {
                        legend: { display: true, labels: { boxWidth: 10, font: { size: 11 } } }
                    }
                }
            });
        }

        // Initialize the three charts
        const tempChart = initChart('tempChart', 'Temperature', '#ff7675', '°C');
        const humiChart = initChart('humiChart', 'Humidity', '#00cec9', '%');
        const presChart = initChart('presChart', 'Pressure', '#a29bfe', 'hPa');

        // Handle connection events
        socket.onopen = () => {
            statusEl.innerText = "Online ✅";
            statusEl.style.color = "#00b894";
            statusEl.style.background = "#e8f8f5";
        };

        socket.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === "door") {
                    handleDoor(msg.data);
                } else if (msg.type === "environment") {
                    handleEnv(msg.data);
                }
            } catch (e) {
                console.error("Error parsing WebSocket message:", e);
            }
        };

        // Update UI for Door Access events
        function handleDoor(data) {
            const logBox = document.getElementById('rfid-logs');
            if (logBox.innerText.includes("Waiting")) logBox.innerHTML = "";
            
            const div = document.createElement('div');
            div.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            const statusText = data.status || 'unknown';
            const statusClass = statusText === 'granted' ? 'status-granted' : 'status-denied';
            
            div.innerHTML = `
                <span class="log-time">[${time}]</span> <br>
                Access: <span class="${statusClass}">${statusText.toUpperCase()}</span>
            `;
            logBox.prepend(div);

            // Maintain log history limit
            if (logBox.children.length > 50) {
                logBox.removeChild(logBox.lastChild);
            }
        }

        // Update UI for Environmental data and charts
        function handleEnv(data) {
            if (data.temp !== undefined) document.getElementById('temp-val').innerText = data.temp.toFixed(1);
            if (data.humidity !== undefined) document.getElementById('humi-val').innerText = data.humidity.toFixed(1);
            if (data.pressure !== undefined) document.getElementById('pres-val').innerText = data.pressure.toFixed(1);

            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            // Helper to push new data to charts
            const updateChart = (chart, value) => {
                if (value === undefined || value === null) return;
                chart.data.labels.push(now);
                chart.data.datasets[0].data.push(value);
                
                // Keep the last 20 data points
                if (chart.data.labels.length > 20) {
                    chart.data.labels.shift();
                    chart.data.datasets[0].data.shift();
                }
                chart.update('none'); // Update without animation for performance
            };

            updateChart(tempChart, data.temp);
            updateChart(humiChart, data.humidity);
            updateChart(presChart, data.pressure);
        }

        socket.onclose = () => {
            statusEl.innerText = "Offline ❌";
            statusEl.style.color = "#d63031";
            statusEl.style.background = "#fff5f5";
        };

        socket.onerror = (err) => {
            console.error("WebSocket Error: ", err);
        };
    </script>
</body>
</html>
